<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康诺芯行业每日要闻 - 归档</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8f6f3 0%, #f0ece5 100%);
            color: #2c3e3e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            padding: 50px 30px;
            background: linear-gradient(145deg, #1a5f5f 0%, #2d8a8a 100%);
            border-radius: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(26,95,95,0.2);
        }
        .brand { color: #e8b86d; font-family: 'Noto Serif SC', serif; font-size: 2.8rem; font-weight: 700; margin-bottom: 12px; }
        .slogan { color: rgba(255,255,255,0.85); font-size: 1.1rem; letter-spacing: 2px; }
        .archive-list { display: flex; flex-direction: column; gap: 12px; }
        .archive-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            background: #fff;
            border-radius: 14px;
            text-decoration: none;
            color: #2c3e3e;
            font-size: 1.1rem;
            font-weight: 500;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.25s ease;
            border-left: 4px solid #1a5f5f;
        }
        .archive-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26,95,95,0.15);
            border-left-color: #e8b86d;
        }
        .archive-date { font-family: 'Noto Serif SC', serif; }
        .archive-arrow { color: #1a5f5f; font-size: 1.3rem; }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #8a9a9a;
            font-size: 0.85rem;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .archive-link { animation: fadeIn 0.4s ease forwards; }
        .archive-link:nth-child(1) { animation-delay: 0.05s; }
        .archive-link:nth-child(2) { animation-delay: 0.1s; }
        .archive-link:nth-child(3) { animation-delay: 0.15s; }
        .archive-link:nth-child(4) { animation-delay: 0.2s; }
        .archive-link:nth-child(5) { animation-delay: 0.25s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">康诺芯</div>
            <div class="slogan">行业每日要闻 · 归档</div>
        </div>
        <div class="archive-list">
            <a href="news-2026-03-28.html" class="archive-link">
                <span class="archive-date">2026年03月28日</span>
                <span class="archive-arrow">→</span>
            </a>
        </div>
        <div class="footer">智芯见康，至心相伴</div>
    </div>
</body>
</html>
